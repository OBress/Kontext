<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#3FB950"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="8" fill="#0D1117"/>
  <!-- K formed from angular strokes with node junctions -->
  <!-- Vertical spine -->
  <line x1="10" y1="7" x2="10" y2="25" stroke="url(#gk)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Upper diagonal arm -->
  <line x1="10" y1="16" x2="21" y2="7" stroke="url(#gk)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lower diagonal arm -->
  <line x1="10" y1="16" x2="21" y2="25" stroke="url(#gk)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Node dots at junctions -->
  <circle cx="10" cy="7" r="1.8" fill="#3FB950"/>
  <circle cx="10" cy="25" r="1.8" fill="#3FB950"/>
  <circle cx="10" cy="16" r="2.2" fill="#3FB950"/>
  <circle cx="21" cy="7" r="1.8" fill="#3FB950"/>
  <circle cx="21" cy="25" r="1.8" fill="#3FB950"/>
  <!-- Secondary connection lines (graph motif) -->
  <line x1="21" y1="7" x2="24" y2="11" stroke="#3FB950" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="21" y1="25" x2="24" y2="21" stroke="#3FB950" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <circle cx="24" cy="11" r="1.2" fill="#3FB950" opacity="0.5"/>
  <circle cx="24" cy="21" r="1.2" fill="#3FB950" opacity="0.5"/>
</svg>
